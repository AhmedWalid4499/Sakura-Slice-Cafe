<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Today's Letters · Sakura Slice Café 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f4f8fc;
      --border: #d0e4f4;
      --blue-deep: #2a4a68;
      --blue-mid: #4a7aaa;
      --blue-light: #6a9ab8;
      --blue-pale: #c0d8f0;
      --text: #2a3a48;
      --text-soft: #5a7a9a;
      --text-muted: #8ab0cc;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      background: var(--cream);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed; top:0; left:0; right:0; z-index:100;
      background: rgba(244,248,252,0.9);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px; height: 64px;
      display:flex; align-items:center; justify-content:space-between;
    }

    .nav-brand { font-family:'Nunito',sans-serif; font-weight:800; font-size:18px; color:var(--blue-deep); text-decoration:none; }
    .nav-back { font-family:'Nunito',sans-serif; font-size:13px; font-weight:700; color:var(--blue-mid); text-decoration:none; letter-spacing:0.5px; }
    .nav-back:hover { color:var(--blue-deep); }
    .nav-jp { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:13px; color:var(--text-muted); }

    /* ─── PAGE HEADER ─── */
    .page-header {
      padding: 110px 24px 60px;
      text-align: center;
      background: linear-gradient(180deg, #eef6ff, #f4f8fc);
      border-bottom: 1px solid var(--border);
    }

    .day-badge {
      display: inline-block;
      background: rgba(100,160,210,0.12);
      border: 1px solid rgba(100,160,210,0.25);
      border-radius: 50px;
      padding: 6px 20px;
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 20px;
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 6vw, 62px);
      font-weight: 300;
      color: var(--blue-deep);
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .page-title em { font-style: italic; color: var(--blue-mid); }

    .page-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 18px;
      color: var(--text-soft);
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ─── TAB SWITCHER ─── */
    .tab-bar {
      display: flex;
      justify-content: center;
      gap: 0;
      padding: 32px 24px 0;
      max-width: 600px;
      margin: 0 auto;
    }

    .tab-btn {
      flex: 1;
      padding: 14px 20px;
      border: 1px solid var(--border);
      background: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.25s;
    }

    .tab-btn:first-child { border-radius: 16px 0 0 16px; border-right: none; }
    .tab-btn:last-child  { border-radius: 0 16px 16px 0; }

    .tab-btn.active {
      background: var(--blue-deep);
      color: white;
      border-color: var(--blue-deep);
    }

    /* ─── LETTER CONTAINER ─── */
    .letter-section { display: none; padding: 40px 24px 80px; }
    .letter-section.active { display: block; }

    /* ─── MORNING LETTER ─── */
    .morning-card {
      max-width: 640px;
      margin: 0 auto;
      background: linear-gradient(170deg, #fafcff 0%, #f5faff 55%, #f8fbff 100%);
      border: 1px solid var(--border);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(80,130,180,0.1);
    }

    .m-hero {
      background: linear-gradient(160deg, #eef6ff 0%, #e4f0fa 60%, #e0eef8 100%);
      border-bottom: 1px solid var(--border);
      padding: 44px 36px 36px;
      text-align: center;
    }

    .m-glow {
      width: 80px; height: 80px;
      background: radial-gradient(circle, rgba(140,190,240,0.28) 0%, transparent 70%);
      border-radius: 50%;
      margin: 0 auto 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 46px;
    }

    .m-greeting {
      font-family: 'Nunito', sans-serif;
      font-size: 28px; font-weight: 800;
      color: #2a4a68; line-height: 1.4; margin-bottom: 10px;
    }

    .m-greeting em { font-style: italic; color: var(--blue-mid); }

    .m-tag {
      display: inline-block;
      background: rgba(80,140,200,0.1);
      border: 1px solid rgba(80,140,200,0.22);
      border-radius: 50px; padding: 5px 16px;
      font-size: 11px; color: #5a7a9a;
      letter-spacing: 2.5px; text-transform: uppercase;
      font-family: 'Nunito',sans-serif; font-weight: 600;
      margin-top: 4px;
    }

    .m-subline {
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 14.5px;
      color: #7a9ab8; padding: 16px 36px 0; line-height: 1.7;
    }

    .m-body { padding: 28px 36px 34px; }

    .m-opening { font-size: 15.5px; line-height: 1.9; color: #3a5068; margin-bottom: 30px; }

    .m-mascot-row {
      display: table; width: 100%; margin-bottom: 30px;
      background: #f5faff; border: 1px solid var(--border);
      border-radius: 18px; padding: 16px;
    }

    .m-mascot-img { display:table-cell; vertical-align:middle; width:108px; padding-right:16px; }
    .m-mascot-img img { width:96px; height:96px; object-fit:cover; border-radius:50%; border:2px solid rgba(100,160,220,0.4); box-shadow:0 4px 16px rgba(80,130,180,0.14); display:block; }
    .m-mascot-text { display:table-cell; vertical-align:middle; }

    .m-speech { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:15.5px; color:#3a5a78; line-height:1.65; }
    .m-attribution { display:block; margin-top:8px; font-size:11.5px; font-family:'DM Sans',sans-serif; font-style:normal; color:#8ab0cc; letter-spacing:1px; }

    .m-divider { border:none; border-top:1px solid var(--border); margin:28px 0; }

    .m-section-title {
      font-family:'Nunito',sans-serif; font-size:12px; font-weight:700;
      letter-spacing:2.5px; text-transform:uppercase; color:#5080a8;
      margin-bottom:16px; display:flex; align-items:center; gap:10px;
    }
    .m-section-title::after { content:''; flex:1; height:1px; background:linear-gradient(to right,#c0d8f0,transparent); }

    .m-prompt { border-radius:16px; padding:18px 20px; margin-bottom:12px; }
    .m-prompt.light { background:#f5faff; border:1px solid var(--border); }
    .m-prompt.frost { background:linear-gradient(135deg,#eef6ff,#e8f2fc); border:1px solid rgba(100,160,210,0.22); }

    .m-prompt-label { font-size:11px; font-family:'Nunito',sans-serif; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#5080a8; margin-bottom:9px; display:block; }
    .m-prompt-text { font-size:15px; line-height:1.75; color:#4a6880; }

    .m-quote { background:#eef6ff; border-left:3px solid #90b8d8; border-radius:0 16px 16px 0; padding:20px 24px; margin:28px 0; }
    .m-quote p { font-family:'Cormorant Garamond',serif; font-size:18px; font-style:italic; color:#3a5a78; line-height:1.7; }

    .m-affirmation { text-align:center; background:linear-gradient(135deg,#eef6ff,#e8f2fc); border:1px solid rgba(100,160,210,0.22); border-radius:20px; padding:28px 24px; margin:28px 0; }
    .m-affirmation-deco { font-size:24px; margin-bottom:12px; display:block; }
    .m-affirmation p { font-family:'Cormorant Garamond',serif; font-size:20px; font-style:italic; color:#2a4a68; line-height:1.7; }
    .m-affirmation-tag { display:inline-block; margin-top:14px; font-size:10.5px; letter-spacing:2px; text-transform:uppercase; color:#8ab0cc; }

    .m-quest { background:linear-gradient(135deg,#eef6ff,#e4f0fa); border:2px dashed #b0cce4; border-radius:20px; padding:24px 26px; margin:28px 0; text-align:center; }
    .m-quest-title { font-family:'Nunito',sans-serif; font-size:14px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#3a6888; margin-bottom:12px; display:block; }
    .m-quest-text { font-size:15px; line-height:1.85; color:#3a5068; }
    .m-quest-text strong { color:#4a78a0; }

    .m-drink { background:#f8fcff; border:1px solid var(--border); border-radius:20px; padding:26px 28px; margin:28px 0; }
    .m-drink-header { font-family:'Nunito',sans-serif; font-size:18px; font-weight:700; color:#3a6888; margin-bottom:6px; text-align:center; }
    .m-drink-sub { text-align:center; font-size:13.5px; color:#7a9ab8; margin-bottom:20px; font-style:italic; font-family:'Cormorant Garamond',serif; }
    .m-drink-label { font-family:'Nunito',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#5080a8; margin-bottom:10px; margin-top:16px; display:block; }

    .m-ingredient-list { list-style:none; padding:0; margin:0 0 8px; }
    .m-ingredient-list li { font-size:14px; color:#3a5068; padding:6px 0; border-bottom:1px solid #ddeef8; display:flex; align-items:center; gap:10px; line-height:1.5; }
    .m-ingredient-list li:last-child { border-bottom:none; }
    .m-ingredient-list li::before { content:'·'; color:#90b8d8; font-size:20px; flex-shrink:0; }

    .m-step-list { list-style:none; padding:0; margin:0; }
    .m-step-list li { font-size:14px; color:#3a5068; padding:8px 0; border-bottom:1px solid #ddeef8; display:flex; gap:12px; line-height:1.6; }
    .m-step-list li:last-child { border-bottom:none; }
    .m-step-num { font-family:'Nunito',sans-serif; font-weight:800; font-size:13px; color:#5080a8; flex-shrink:0; width:20px; margin-top:1px; }

    .m-drink-quote { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:15px; color:#3a5a78; text-align:center; padding:14px 16px; background:#eef6ff; border-radius:12px; margin-top:18px; line-height:1.6; }

    .m-ctas { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:28px; }

    .m-footer { padding:26px 36px 32px; text-align:center; border-top:1px solid var(--border); }
    .m-footer-brand { font-family:'Nunito',sans-serif; font-size:17px; font-weight:700; color:#5080a8; margin-bottom:6px; }
    .m-footer-sub { font-size:12px; color:#8ab8d8; letter-spacing:0.8px; line-height:1.6; }
    .m-footer-icons { font-size:19px; letter-spacing:7px; margin-top:14px; opacity:0.4; }

    /* ─── EVENING CARD ─── */
    .evening-card {
      max-width: 640px; margin: 0 auto;
      background: linear-gradient(170deg, #131c28 0%, #0f1720 55%, #111822 100%);
      border: 1px solid #1e2e3e; border-radius: 28px; overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .e-hero {
      background: linear-gradient(180deg, #152030 0%, #0e1820 100%);
      border-bottom: 1px solid #1c2c3c; padding: 44px 36px 36px; text-align: center;
    }

    .e-glow { width:80px; height:80px; background:radial-gradient(circle,rgba(100,150,200,0.16) 0%,transparent 70%); border-radius:50%; margin:0 auto 6px; display:flex; align-items:center; justify-content:center; font-size:44px; }

    .e-greeting { font-family:'Nunito',sans-serif; font-size:29px; font-weight:700; color:#ddeeff; line-height:1.45; margin-bottom:10px; }
    .e-greeting em { font-style:italic; color:#7aaace; }
    .e-tag { display:inline-block; background:rgba(100,150,200,0.1); border:1px solid rgba(100,150,200,0.2); border-radius:50px; padding:5px 16px; font-size:11px; color:#7a9ab8; letter-spacing:2.5px; text-transform:uppercase; font-weight:500; margin-top:4px; font-family:'Nunito',sans-serif; }

    .e-subline { text-align:center; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:14px; color:#5a7a94; padding:16px 36px 0; line-height:1.6; }

    .e-body { padding:28px 36px 34px; }
    .e-opening { font-size:15.5px; line-height:1.9; color:#c8d8e8; margin-bottom:30px; }

    .e-mascot-row { display:table; width:100%; margin-bottom:30px; background:#101820; border:1px solid #1e2e40; border-radius:18px; padding:16px; }
    .e-mascot-img { display:table-cell; vertical-align:middle; width:108px; padding-right:16px; }
    .e-mascot-img img { width:96px; height:96px; object-fit:cover; border-radius:50%; border:2px solid rgba(120,170,220,0.4); box-shadow:0 0 16px rgba(100,150,200,0.14); display:block; }
    .e-mascot-text { display:table-cell; vertical-align:middle; }
    .e-speech { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:15.5px; color:#c8ddf0; line-height:1.65; }
    .e-attribution { display:block; margin-top:8px; font-size:11.5px; font-family:'DM Sans',sans-serif; font-style:normal; color:#445a70; letter-spacing:1px; }

    .e-divider { border:none; border-top:1px solid #161e28; margin:28px 0; }

    .e-section-title { font-family:'Nunito',sans-serif; font-size:12px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:#6a9ab8; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
    .e-section-title::after { content:''; flex:1; height:1px; background:linear-gradient(to right,#1e3040,transparent); }

    .e-prompt { border-radius:16px; padding:18px 20px; margin-bottom:12px; }
    .e-prompt.cool { background:#101820; border:1px solid #1e2e40; }
    .e-prompt.frost { background:linear-gradient(135deg,#121e2c,#101820); border:1px solid rgba(100,150,200,0.2); }

    .e-prompt-label { font-size:11px; font-family:'Nunito',sans-serif; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#6a9ab8; margin-bottom:9px; display:block; }
    .e-prompt-text { font-size:15px; line-height:1.75; color:#a8c0d4; }

    .e-quote { background:#0e1620; border-left:3px solid #6a9ab8; border-radius:0 16px 16px 0; padding:20px 24px; margin:28px 0; }
    .e-quote p { font-family:'Cormorant Garamond',serif; font-size:18px; font-style:italic; color:#c8ddf0; line-height:1.7; }

    .e-affirmation { text-align:center; background:#0e1620; border:1px solid rgba(100,150,200,0.18); border-radius:20px; padding:28px 24px; margin:28px 0; }
    .e-affirmation-deco { font-size:22px; margin-bottom:12px; display:block; opacity:0.6; }
    .e-affirmation p { font-family:'Cormorant Garamond',serif; font-size:19px; font-style:italic; color:#c8ddf0; line-height:1.7; }
    .e-affirmation-tag { display:inline-block; margin-top:14px; font-size:10.5px; letter-spacing:2px; text-transform:uppercase; color:#445a70; }

    .e-winddown { list-style:none; margin:0; padding:0; }
    .e-winddown li { display:flex; align-items:flex-start; gap:14px; padding:14px 0; border-bottom:1px solid #141e28; font-size:14.5px; color:#90aac0; line-height:1.65; }
    .e-winddown li:last-child { border-bottom:none; }
    .e-winddown-icon { font-size:20px; flex-shrink:0; margin-top:1px; width:28px; text-align:center; }

    .e-story { background:#0c1420; border:1px solid #1c2c3c; border-radius:20px; padding:26px 28px; margin:28px 0; }
    .e-story-header { font-family:'Nunito',sans-serif; font-size:17px; font-weight:700; color:#c8ddf0; margin-bottom:18px; text-align:center; letter-spacing:0.5px; }
    .e-story p { font-size:14.5px; line-height:1.9; color:#7a9ab0; margin-bottom:13px; }
    .e-story p:last-child { margin-bottom:0; }
    .e-story em { color:#7aaace; font-style:italic; }

    .e-cta-wrap { text-align:center; margin:34px 0 10px; }
    .e-cta-btn { display:inline-block; background:linear-gradient(135deg,#4a7aa0,#6a9ac0); color:#0c1018 !important; text-decoration:none; font-family:'Nunito',sans-serif; font-weight:700; font-size:14px; letter-spacing:0.5px; padding:14px 32px; border-radius:50px; box-shadow:0 6px 24px rgba(80,130,180,0.28); }

    .e-footer { padding:26px 36px 32px; text-align:center; border-top:1px solid #141e28; }
    .e-footer-brand { font-family:'Nunito',sans-serif; font-size:17px; font-weight:700; color:#6a9ab8; margin-bottom:6px; }
    .e-footer-sub { font-size:12px; color:#2a3a4a; letter-spacing:0.8px; line-height:1.6; }
    .e-footer-icons { font-size:19px; letter-spacing:7px; margin-top:14px; opacity:0.45; }

    /* ─── day content switcher ─── */
    .day-content { display:none; }
    .day-content.active { display:block; }

    @media (max-width:640px) {
      .m-body, .e-body { padding:20px 20px 28px; }
      .m-hero, .e-hero { padding:32px 20px 28px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-brand">🌸 Sakura Slice Café</a>
    <a href="index.html" class="nav-back">← Back to Café</a>
    <span class="nav-jp">今日のお手紙</span>
  </nav>

  <div class="page-header">
    <div class="day-badge" id="day-badge">Loading...</div>
    <h1 class="page-title">Today's <em>Letters</em></h1>
    <p class="page-sub" id="page-sub-text">Each day brings its own letter — morning warmth & evening stillness.</p>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-morning" onclick="switchTab('morning')">☀️ Morning Letter</button>
    <button class="tab-btn" id="tab-evening" onclick="switchTab('evening')">🌙 Evening Letter</button>
  </div>

  <!-- MORNING SECTION -->
  <div class="letter-section active" id="section-morning">
    <!-- day content injected by JS -->
    <div id="morning-content"></div>
  </div>

  <!-- EVENING SECTION -->
  <div class="letter-section" id="section-evening">
    <div id="evening-content"></div>
  </div>

  <script>
    // ─── Day Data ───
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const dayJP = ['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];
    const dayEmoji = ['☃️','🌿','🌸','🍵','✨','🌊','🍁'];
    const dayJPMeaning = ['心を休ませる日','新しい週の始まり','前進する日','真ん中で息をつく','感謝の日','解放される日','自分自身のための日'];
    const dayMeaningEN = ['A day to rest the heart','The beginning of something new','A day to keep moving','Halfway there — breathe','A day for gratitude','Let it all go','A day entirely for you'];

    const morningOpenings = {
      Sunday:    "Sunday arrives differently than every other morning. It doesn't knock urgently. It just opens — quietly, like a window you forgot was there, letting in air that smells faintly of rest and possibility.<br><br>Today, you are allowed to move slowly. To stretch time. To sip something warm and let your thoughts settle on their own without being asked to become anything useful.",
      Monday:    "Monday arrives with the smell of possibility still wrapped around it — the whole week unheld, like a letter that hasn't been opened yet.<br><br>Before the week takes what it needs from you, take one quiet moment for yourself. You are allowed to begin gently. The best weeks start with intention, not urgency.",
      Tuesday:   "Tuesday is the quiet middle child of the week — not the excitement of Monday, not the relief of Friday. It simply shows up and asks you to keep going.<br><br>And sometimes, just keeping going is the most courageous thing. Today you don't have to be inspired. You just have to be present.",
      Wednesday: "Wednesday knows what it's like to be halfway somewhere. Neither here nor there — but that's where the most interesting views are.<br><br>Pause in the middle of this week and notice what you've already carried. Notice what you've already done. Halfway is still progress.",
      Thursday:  "Thursday carries a quiet excitement — the weekend is close enough to feel but not so close you've stopped caring about today.<br><br>Let Thursday be its own thing. Something worth arriving to. You've made it this far, which means you'll make it the rest of the way.",
      Friday:    "Friday tastes different. There's something lighter in it — a release that starts in your shoulders before your mind even knows the week is ending.<br><br>You've done enough. Whatever you didn't finish can wait. Tonight, let yourself arrive somewhere softer.",
      Saturday:  "Saturday asks nothing of you except that you remember what rest feels like. Not productive rest. Not self-improvement rest. Just the plain, honest, necessary kind.<br><br>This morning, there's no agenda. Just you, this warmth, and all the unhurried hours stretched out like a favourite blanket."
    };

    const morningQuests = {
      Sunday: { title: "Do One Thing Slowly Today", text: "Pick anything — eating, making your drink, walking, reading, even washing dishes. Do it at <strong>half your usual speed</strong>. Notice what you normally rush past." },
      Monday: { title: "Set One Gentle Intention", text: "Not a to-do list. One word or sentence that describes how you want to <strong>feel</strong> by the end of this week. Write it down. Let it guide, not pressure." },
      Tuesday: { title: "Find One Small Beauty", text: "Today, notice <strong>one specific thing</strong> you would have walked past without seeing. A texture, a light, a sound, a detail. Name it and let it matter." },

            <li><span class="e-winddown-icon">🧸</span><span>Find something soft to hold. Let your body register: the day is done. You are safe. You can soften now.</span></li>
            <li><span class="e-winddown-icon">📝</span><span>Write one line you wish someone would say to you tonight — then give it to yourself. Let it count as much as it would if someone else had said it.</span></li>
            <li><span class="e-winddown-icon">🌬️</span><span>Try box breathing: inhale 4 counts, hold 4, exhale 4, hold 4. Repeat three times. The night already knows it's time to be still.</span></li>
            <li><span class="e-winddown-icon">🌙</span><span>Dim everything — screens, lights, thoughts. You don't need to fill this silence. Just let it hold you for a while.</span></li>
          </ul>
          <hr class="e-divider">
          <div class="e-story">
            <div class="e-story-header">${story.header}</div>
            ${storyHTML}
          </div>
          <div class="e-cta-wrap">
            <a href="https://docs.google.com/document/d/1rLakqh3VjtNcJrs0s2436LTrJhRiGDMK/edit?usp=sharing" class="e-cta-btn">📖 Open Your Night Journal</a>
          </div>
        </div>
        <div class="e-footer">
          <div class="e-footer-brand">Sakura Slice Café 🌸</div>
          <div class="e-footer-sub">With snowlight, cocoa warmth & a gentle hush ❄️☕<br>Sent with care, just for you 🤍</div>
          <div class="e-footer-icons">🌙 ❄️ 🕯️ ☕ 🌸</div>
        </div>
      </div>`;
    }

    // Inject content
    document.getElementById('morning-content').innerHTML = buildMorning(dayName);
    document.getElementById('evening-content').innerHTML = buildEvening(dayName);

    // Tab switching
    function switchTab(tab) {
      document.querySelectorAll('.letter-section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('section-' + tab).classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }

    // Auto-switch to evening if after 5pm
    const hour = new Date().getHours();
    if (hour >= 17) switchTab('evening');

    // Handle hash
    if (location.hash === '#evening') switchTab('evening');
    if (location.hash === '#morning') switchTab('morning');
  </script>

</body>
</html>
